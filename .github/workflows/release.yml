name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.4.0-auto1)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  cli:
    name: CLI / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}
      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} --bin openfang
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../openfang-${{ matrix.target }}.tar.gz openfang
          cd ../../..
          sha256sum openfang-${{ matrix.target }}.tar.gz > openfang-${{ matrix.target }}.tar.gz.sha256
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: openfang-${{ matrix.target }}.*
          body: |
            ## AutoLauncher Fork

            Custom OpenFang build with fixes for:
            - Template agents respecting `[default_model]` from config.toml
            - Tool use serialization (empty input as `{}`)

            **Install:**
            ```bash
            curl -fsSL -o openfang.tar.gz \
              "https://github.com/ephriamk/openfang/releases/download/${{ github.ref_name }}/openfang-x86_64-unknown-linux-gnu.tar.gz"
            tar xzf openfang.tar.gz
            chmod +x openfang
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
